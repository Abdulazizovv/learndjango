<div id="logoutModal" 
class="fixed inset-0 hidden items-center justify-center bg-black/60 backdrop-blur-sm z-50">

    <div class="glass w-full max-w-sm rounded-2xl p-6 shadow-xl">

        <h2 class="text-xl font-bold mb-2">Confirm Logout</h2>
        <p class="text-gray-400 text-sm mb-6">
            Are you sure you want to sign out from Nexus?
        </p>

        <div class="flex justify-end gap-3">

            <button onclick="closeLogoutModal()"
            class="px-4 py-2 rounded-lg border border-white/10 text-gray-400 hover:bg-white/5">
                Cancel
            </button>

            <a href="{% url 'logout' %}"
            class="px-4 py-2 rounded-lg bg-red-500/20 border border-red-500/30 text-red-400 hover:bg-red-500/30">
                Logout
            </a>

        </div>

    </div>

</div>
