{% extends "main/base.html" %}

{% block title %}Login — Nexus Learning{% endblock %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center">

    <div class="glass w-full max-w-md rounded-2xl p-8 shadow-2xl shadow-indigo-500/10">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold">Welcome Back</h1>
            <p class="text-gray-400 text-sm mt-2">Login to your Nexus account</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="text-sm text-gray-400">Username</label>
                <input 
                    type="text" 
                    name="username" 
                    required
                    class="w-full mt-1 px-4 py-3 rounded-lg bg-black/40 border border-white/10 focus:border-indigo-500 focus:outline-none">
            </div>

            <div>
                <label class="text-sm text-gray-400">Password</label>
                <input 
                    type="password" 
                    name="password" 
                    required
                    class="w-full mt-1 px-4 py-3 rounded-lg bg-black/40 border border-white/10 focus:border-indigo-500 focus:outline-none">
            </div>

            <div class="flex items-center justify-between text-sm text-gray-400">
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-indigo-500">
                    Remember me
                </label>

                <a href="#" class="text-indigo-500 hover:underline">
                    Forgot password?
                </a>
            </div>

            <button 
                type="submit"
                class="w-full py-3 rounded-lg pro-gradient font-semibold hover:opacity-90 transition">
                Sign In
            </button>

        </form>

        <p class="text-center text-gray-500 text-sm mt-6">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-indigo-500 hover:underline">
                Create one
            </a>
        </p>

    </div>

</div>

{% endblock content %}
