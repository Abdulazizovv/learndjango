<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus Learning — Pro Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; /* Deep Black */
            color: #ffffff;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .pro-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
    </style>
</head>
<body class="antialiased">

    <nav class="glass sticky top-0 z-50 py-4 px-8 mb-12 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 pro-gradient rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <span class="font-bold text-white">N</span>
                </div>
                <h2 class="text-xl font-extrabold tracking-tight">NEXUS <span class="text-indigo-500">PRO</span></h2>
            </div>
            <div class="text-[10px] text-gray-500 font-mono tracking-widest uppercase bg-white/5 px-3 py-1 rounded-full">
                System Status: Optimized
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6">
        {% block content %}
        {% endblock content %}
    </main>

</body>
</html>
