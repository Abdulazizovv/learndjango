<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus Learning — Pro Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; /* Deep Black */
            color: #ffffff;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .pro-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
    </style>
</head>
<body class="antialiased">

    <nav class="glass sticky top-0 z-50 py-4 px-8 mb-12 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 pro-gradient rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <span class="font-bold text-white">N</span>
                </div>
                <h2 class="text-xl font-extrabold tracking-tight">NEXUS <span class="text-indigo-500">PRO</span></h2>
            </div>
            <div class="text-[10px] text-gray-500 font-mono tracking-widest uppercase bg-white/5 px-3 py-1 rounded-full">
                User: {{request.user}}
                {% if request.user.is_authenticated %}
                <button onclick="openLogoutModal()"
                class="text-sm bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-2 rounded-lg hover:bg-red-500/20 transition">
                    Logout
                </button>
                {% else %}
                <button"
                class="text-sm bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-2 rounded-lg hover:bg-red-500/20 transition">
                    <a href="{% url 'login' %}">Login</a>
                </button>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6">
        {% if messages %}
        <div class="max-w-7xl mx-auto px-6 mb-6 space-y-3">
            {% for message in messages %}
            
            <div class="
                glass px-5 py-4 rounded-xl flex items-center justify-between
                {% if message.tags == 'success' %} border-green-500/30 {% endif %}
                {% if message.tags == 'error' %} border-red-500/30 {% endif %}
                {% if message.tags == 'warning' %} border-yellow-500/30 {% endif %}
                {% if message.tags == 'info' %} border-indigo-500/30 {% endif %}
            ">

                <span class="
                text-sm font-medium
                {% if message.tags == 'success' %} text-green-400 {% endif %}
                {% if message.tags == 'error' %} text-red-400 {% endif %}
                {% if message.tags == 'warning' %} text-yellow-400 {% endif %}
                {% if message.tags == 'info' %} text-indigo-400 {% endif %}
                ">
                    {{ message }}
                </span>

                <button onclick="this.parentElement.remove()" 
                class="text-gray-500 hover:text-white text-sm">
                    ✕
                </button>

            </div>

            {% endfor %}
        </div>
        {% endif %}
        {% block content %}
        {% endblock content %}

        {% include "main/modals/logout.html" %}
    </main>

    <script>

    function openLogoutModal() {
        document.getElementById("logoutModal").classList.remove("hidden")
        document.getElementById("logoutModal").classList.add("flex")
    }

    function closeLogoutModal() {
        document.getElementById("logoutModal").classList.add("hidden")
        document.getElementById("logoutModal").classList.remove("flex")
    }

    </script>

</body>
</html>
